<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meloman - Пошук Частоти</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome для іконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --color-bg-dark: #0C1040;
            --color-bg-darker: #180E30;
            --color-accent: #A54DC6;
            --color-text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--color-bg-darker) 0%, var(--color-bg-dark) 100%);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* Динамічний бекграунд для створення ефекту "глибини" */
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 480px; /* Адаптація під мобільний вигляд (стиль Linktree) */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 30px;
            padding: 40px 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            border: 1px solid rgba(165, 77, 198, 0.15);
        }

        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--color-bg-dark), var(--color-accent));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            color: white;
            box-shadow: 0 0 25px rgba(165, 77, 198, 0.6);
            border: 4px solid var(--color-accent);
            position: relative;
            z-index: 2;
        }

        /* Анімація світіння (пульсація) навколо аватару */
        .avatar-container::before {
            content: '';
            position: absolute;
            top: -5%;
            left: -5%;
            right: -5%;
            bottom: -5%;
            border-radius: 50%;
            background: var(--color-accent);
            z-index: 1;
            filter: blur(20px);
            opacity: 0.5;
            animation: pulse 3s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.4; }
            100% { transform: scale(1.05); opacity: 0.7; }
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 14px;
            color: #b0b0b0;
            margin-bottom: 35px;
            font-weight: 400;
        }

        .album-section {
            margin-bottom: 35px;
        }

        .album-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
            background: rgba(165, 77, 198, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid rgba(165, 77, 198, 0.4);
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            text-decoration: none;
            color: var(--color-text);
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .link-btn i {
            font-size: 24px;
            margin-right: 15px;
            width: 24px; /* фіксована ширина для вирівнювання тексту */
        }

        .link-btn.spotify {
            background: linear-gradient(90deg, rgba(29, 185, 84, 0.1) 0%, rgba(255,255,255,0.05) 100%);
            border-left: 4px solid #1DB954;
        }
        .link-btn.spotify:hover {
            background: rgba(29, 185, 84, 0.2);
            border-color: #1DB954;
        }
        .link-btn.spotify i { color: #1DB954; }

        .link-btn.youtube {
            background: linear-gradient(90deg, rgba(255, 0, 0, 0.1) 0%, rgba(255,255,255,0.05) 100%);
            border-left: 4px solid #FF0000;
        }
        .link-btn.youtube:hover {
            background: rgba(255, 0, 0, 0.2);
            border-color: #FF0000;
        }
        .link-btn.youtube i { color: #FF0000; }

        .social-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(165, 77, 198, 0.5), transparent);
            margin: 30px 0;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-icon {
            color: var(--color-text);
            font-size: 26px;
            transition: all 0.3s ease;
            text-decoration: none;
            opacity: 0.6;
        }

        .social-icon:hover {
            color: var(--color-accent);
            opacity: 1;
            transform: scale(1.15) translateY(-3px);
            text-shadow: 0 5px 15px rgba(165, 77, 198, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-container">
            <div class="avatar">
                <i class="fa-solid fa-headphones-simple"></i>
            </div>
        </div>
        
        <h1>Meloman</h1>
        <div class="subtitle">Офіційна сторінка</div>

        <div class="album-section">
            <div class="album-title">
                <i class="fa-solid fa-compact-disc fa-spin" style="margin-right: 8px; font-size: 14px; animation-duration: 4s;"></i> 
                Пошук Частоти
            </div>
            
            <a href="https://open.spotify.com/album/3hbsJ2RNzOmqEF8Db4lwBL" target="_blank" rel="noopener noreferrer" class="link-btn spotify">
                <i class="fa-brands fa-spotify"></i>
                Слухати на Spotify
            </a>

            <a href="https://music.youtube.com/playlist?list=OLAK5uy_lYGA04h-BfzBq4-RB7xYYE1zyOdywfNv8" target="_blank" rel="noopener noreferrer" class="link-btn youtube">
                <i class="fa-brands fa-youtube"></i>
                Слухати на YouTube Music
            </a>
        </div>

        <div class="social-divider"></div>

        <div class="social-icons">
            <a href="https://www.instagram.com/denchuhuiev?igsh=MWViNWZqanBzdW10YQ==" target="_blank" rel="noopener noreferrer class="social-icon" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@meloman_deep?_r=1&_t=ZN-95cUpzQtYAQ" target="_blank" rel="noopener noreferrer class="social-icon" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
            <a href="#" class="social-icon" aria-label="Telegram"><i class="fa-brands fa-telegram"></i></a>
            <a href="#" class="social-icon" aria-label="SoundCloud"><i class="fa-brands fa-soundcloud"></i></a>
        </div>
    </div>

</body>
</html>
